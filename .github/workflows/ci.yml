name: CI

on:
  push:
    # Sans "[skip ci]" (voir sync-dao.yml — Netlify le traite aussi comme un
    # ordre de sauter le déploiement), les commits automatiques du job Sync
    # DAO (toutes les 15 min) déclencheraient sinon ce workflow pour rien.
    paths-ignore:
      - "scripts/.dao-sync-state.json"
      - "front/public/dao-index.json"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx hardhat compile

      - run: npx tsc --noEmit

      - run: npx hardhat test

  front:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front/package-lock.json

      - run: npm ci

      - run: npm run build
