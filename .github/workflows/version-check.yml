name: Version check

# Ne couvre que les tags contract-vX.Y.Z : le front (front-vA.B.C) a son
# propre cycle de version, indépendant, et n'a pas de constante on-chain à
# recouper (cf. .github/workflows/release-front.yml).
on:
  push:
    tags:
      - "contract-v*.*.*"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare tag to on-chain VERSION constant
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#contract-v}"
          CONTRACT_VERSION=$(grep -oP 'string public constant VERSION = "\K[^"]+' contracts/Meute.sol)

          echo "Tag:      $GITHUB_REF_NAME (version $TAG_VERSION)"
          echo "Contract: VERSION = \"$CONTRACT_VERSION\""

          if [ "$TAG_VERSION" != "$CONTRACT_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match contracts/Meute.sol VERSION (\"$CONTRACT_VERSION\"). Bump VERSION before tagging."
            exit 1
          fi
