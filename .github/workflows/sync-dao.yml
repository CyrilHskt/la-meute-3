name: Sync DAO

on:
  schedule:
    # Toutes les 15 minutes — la fréquence réelle de GitHub Actions peut
    # varier un peu selon la charge, mais l'état persisté (dernier bloc
    # traité) garantit qu'aucun event n'est raté ni traité deux fois.
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # Généreux pour le tout premier run : le plan gratuit Alchemy limite
    # eth_getLogs à 10 blocs/requête et à un débit de compute units par
    # seconde assez bas (voir scripts/sync-dao.js — délai fixe + retries
    # avec backoff sur les 429), donc le rattrapage complet depuis le
    # déploiement représente des centaines de requêtes séquentielles,
    # chacune espacée. Les runs suivants ne traitent que ~75 blocs
    # (l'intervalle du cron) et finissent en quelques secondes — l'état
    # cumulatif (Netlify Blobs, via netlify/functions/dao-sync.mts) évite
    # de tout rescanner à chaque fois.
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx hardhat compile

      # Aucune étape de commit ensuite : l'état et l'instantané sont écrits
      # directement dans Netlify Blobs par le script lui-même (HTTP), pas
      # dans le dépôt — publier une donnée fraîche ne doit jamais déclencher
      # un rebuild du site.
      - run: node scripts/sync-dao.js
        env:
          RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SYNC_ENDPOINT: ${{ secrets.SYNC_ENDPOINT }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
